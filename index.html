<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parul University - Hostel & Aarogya Card</title>
    <!-- Icons ke liye FontAwesome link kiya hai -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ebebef;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        /* Top Header */
        .header{
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:14px 18px;
    border-bottom:1px solid #ececec;
}


.logo-section{
 flex:1;
}

.logo-img{
    width:240px;
    max-width:68vw;
    min-width:190px;
    height:auto;
}

.header-right{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.menu-icon{
    font-size:32px;
    color:#d8d8d8;
}

.profile-thumb{
    width:52px;
    height:52px;
    border-radius:50%;
    border:3px solid #fff;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
}

        /* Sub Header / User Title Section */
     .sub-header{
    background:#eef2f7;
    padding:18px;
}

.header-title{
    display:flex;
    align-items:baseline;
    flex-wrap:wrap;
    gap:8px;
}

.title-text{
    font-size:22px;
    font-weight:400;
    color:#6b7280;
    line-height:1.2;
}

.name-text{
    font-size:14px;
    color:#a8b2bd;
    font-weight:500;
    text-transform:uppercase;
    line-height:1.2;
}
        

        /* Main ID Card Container */
        .card-body{
    padding:28px 18px 40px;
    text-align:center;
}

        .mess-banner{
    height:78px;
    padding:0 18px;
    display:flex;
    align-items:center;
    font-size:22px;
    font-weight:700;
}

        /* Mess Header Banner */
        .mess-banner {
            background: linear-gradient(to right, #16365c, #2a4b7c);
            color: #ffffff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Card Content Area */
        .card-body {
            padding: 20px 15px;
            text-align: center;
        }

        /* Central Student Photo */
        .student-photo-wrapper{
    margin-bottom:24px;
}

        .student-photo{
    width:125px;
    height:160px;
    object-fit:cover;
    border-radius:16px;
    border:1px solid #e0e0e0;
}

        /* Student Name */
        .student-name{
    font-size:18px;
    font-weight:800;
    color:#1e293b;
    line-height:1.3;
    margin-bottom:25px;
    text-transform:uppercase;
}

        /* Details Grid/Table */
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            text-align: left;
        }

        .details-table td{
    padding:9px 4px;
    font-size:15px;
}

        .icon-col{
    width:32px;
    color:#3a86ca;
    font-size:16px;
}

        .label-col{
    width:135px;
    color:#64748b;
    white-space:nowrap;
}

        .value-col {
            color: #334155;
            font-weight: 500;
        }

        .value-col.danger-text {
            color: #ef4444;
            font-weight: 600;
        }

        /* Live Clock Section */
        .timer-section{
    border-top:1px dashed #cbd5e1;
    border-bottom:1px dashed #cbd5e1;
    margin-top:30px;
    padding:22px 0;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

        /* Side small circles on dash line */
        .timer-section::before, .timer-section::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid #cbd5e1;
            background-color: #fff;
            border-radius: 50%;
            top: calc(50% - 6px);
        }
        .timer-section::before { left: 15px; }
        .timer-section::after { right: 15px; }

       .live-date{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:6px;
}

.live-time{
    font-size:32px;
    color:#00a884;
    font-weight:bold;
}

        /* Footer Copyright */
        .footer {
            background-color: #334155;
            color: #94a3b8;
            text-align: left;
            padding: 12px 15px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scroll-top-btn {
            color: #94a3b8;
            font-size: 16px;
            border: 1px solid #475569;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width:480px){

    .card-container{
        padding:18px 14px;
    }
    @media (max-width:480px){

    .title-text{
        font-size:18px;
    }

    .name-text{
        font-size:12px;
    }
}
}

    .id-card{
    width:100%;
    max-width:375px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    min-height:730px;   /* Increase card height */
}
.card-container{
    padding:18px 12px;
    background:#efeff5;
}

.card-gap{
    height:180px;      /* Increase to 150px if needed */
}

    </style>
</head>
<body>

    <!-- Header Section -->
   <div class="header">

    <div class="header-right">
        <div class="menu-icon">

        </div>

        <img src="photo.jpeg" alt="Student Thumbnail" class="profile-thumb">

</div>

    <!-- Sub Header Section -->
   <div class="sub-header">
    <div class="header-title">
        <span class="title-text">Hostel & Aarogya Card</span>
        <span class="name-text">RITIK KUMAR</span>

</div>
    <!-- Main Card Container -->
    <div class="card-container">
        <div class="id-card">
            
            <!-- Mess Header -->
            <div class="mess-banner">

            </div>

            <!-- Card Body Details -->
            <div class="card-body">
                
                <!-- Main Student Photo -->
                <div class="student-photo-wrapper">
                    <img src="photo.jpeg"" alt="PANIGRAHI NARAYAN SURAJBHAI" class="student-photo">
                </div>

                <!-- Student Full Name -->
                <div class="student-name">
                    Ritik Kumar<br>
                </div>

                <!-- Profile Information Table -->
                <table class="details-table">
                    <tr>
                        <td class="icon-col">
    <i class="fa-solid fa-list"></i>
</td>
                        <td class="label-col">Enrollment No.</td>
                        <td class="value-col">2503051050528</td>
                    </tr>
                    <tr>
                        <td class="icon-col"><i class="fa-solid fa-building"></i></td>
                        <td class="label-col">Hostel</td>
                        <td class="value-col">AZAD BHAWAN - A</td>
                    </tr>
                    <tr>
                        <td class="icon-col"><i class="fa-solid fa-phone"></i></td>
                        <td class="label-col">Contact No.</td>
                        <td class="value-col">9709362173</td>
                    </tr>
                    <tr>
                        <td class="icon-col"><i class="fa-solid fa-graduation-cap"></i></td>
                        <td class="label-col">Institute</td>

                    <tr>

    01-07-2026 to 30-06-<br>2027
</td>
                    </tr>
                </table>

                <!-- Real Time Live Clock Component -->
                <div class="timer-section">
                    <div class="live-date" id="live-date">02-07-2026</div>

                </div>
                

            </div>
            
        </div>
        <div class="card-gap"></div>
    </div>
    

    <!-- Bottom Footer Layout -->
    <div class="footer">
        <div>2026 &copy; Parul University</div>
        <div class="scroll-top-btn">
            <i class="fa-solid fa-arrow-up"></i>
        </div>
    </div>

    <!-- Live Date and Time Script -->
    <script>
        function updateClock() {
    const now = new Date();

    // Date
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();

    const formattedDate = `${day}-${month}-${year}`;

    // Time
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;

    const formattedTime = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;

    document.getElementById("live-date").textContent = formattedDate;
    document.getElementById("live-time").textContent = formattedTime;
}

updateClock();
setInterval(updateClock, 1000);
    </script>
</body>
</html>
